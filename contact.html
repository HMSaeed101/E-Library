<!doctype html>
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="icon" type="image/svg" href="Pics/svg/logo.svg" />

	<title>E-Library | Contact Us</title>

	<link rel="stylesheet" href="CSS/index.css" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&display=swap"
		rel="stylesheet"
	/>
	<link rel="stylesheet" href="CSS/index.css" />
</head>
<body>
	<div id="nav-bar"></div>

	<section class="hero-pages" id="contact-hero-page">
		<h2>Contact Us</h2>
		<p>Have a question or suggestion? Reach out to us!</p>
	</section>

	<section class="contact-page-form-section">
		<form
			class="contact-page-form"
			action="contact-action.html"
			method="POST"
		>
			<div class="form-row">
				<label for="name">Name</label>
				<input
					type="text"
					id="name"
					name="name"
					placeholder="Enter your name"
					required
				/>
			</div>

			<div class="form-row">
				<label for="email">Email</label>
				<input
					type="email"
					id="email"
					name="email"
					placeholder="Enter your email"
					required
				/>
			</div>

			<div class="form-row">
				<label for="subject">Subject</label>
				<input
					type="text"
					id="subject"
					name="subject"
					placeholder="Subject for message"
					required
				/>
			</div>

			<div class="form-row">
				<label for="message">Message</label>
				<textarea
					id="message"
					name="message"
					rows="3"
					placeholder="Write your message here"
					required
				></textarea>
			</div>

			<div class="form-row" id="submit-btn">
				<button class="button" type="submit">Send Message</button>
			</div>
		</form>
	</section>

	<div id="footer"></div>
	<script src="JavaScript/include.js"></script>
	<script>
		includeHTML("nav-bar", "Extras/nav-bar.html");
		includeHTML("footer", "Extras/footer.html");
	</script>
	<script type="module" src="JavaScript/main.js" defer></script>
</body>
